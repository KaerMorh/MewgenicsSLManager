name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Get tag message
        id: tag_message
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="See the assets to download and install this version."
          fi
          echo "body<<MSGEOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MSG" >> "$GITHUB_OUTPUT"
          echo "MSGEOF" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MewgenicsSLManager ${{ github.ref_name }}'
          releaseBody: ${{ steps.tag_message.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

  deploy-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest.json and deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p deploy
          gh release download "$TAG" --pattern "latest.json" --dir deploy
          mv deploy/latest.json deploy/updater.json
          cat deploy/updater.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
