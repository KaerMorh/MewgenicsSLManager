name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (NSIS only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MewgenicsSLManager ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

  deploy-updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download release assets info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.version }}"
          gh release download "$TAG" --pattern "*.nsis.zip.sig" --dir /tmp/sig
          SIGNATURE=$(cat /tmp/sig/*.nsis.zip.sig)
          echo "signature<<SIGEOF" >> "$GITHUB_ENV"
          echo "$SIGNATURE" >> "$GITHUB_ENV"
          echo "SIGEOF" >> "$GITHUB_ENV"
          NSIS_ZIP_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | endswith(".nsis.zip")) | .browser_download_url')
          echo "nsis_zip_url=$NSIS_ZIP_URL" >> "$GITHUB_ENV"

      - name: Generate updater.json
        run: |
          TAG="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mkdir -p deploy
          jq -n \
            --arg version "$TAG" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "${{ env.signature }}" \
            --arg url "${{ env.nsis_zip_url }}" \
            '{
              version: $version,
              notes: "See the release page for details.",
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > deploy/updater.json
          cat deploy/updater.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
